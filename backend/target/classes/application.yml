server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: community-prime

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/community_prime?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 0
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        max-wait: -1ms
    timeout: 10000ms

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# Redisson配置
redisson:
  address: redis://localhost:6379
  password: 123456
  database: 0
  connection-minimum-idle-size: 10
  connection-pool-size: 64

# 自定义配置
community:
  sms:
    # 模拟短信验证码，实际项目接入阿里云/腾讯云短信服务
    enabled: true
  jwt:
    secret: community-prime-secret-key-2024
    expiration: 86400000  # 24小时
  seckill:
    # 秒杀订单队列
    order-stream-key: seckill:order:stream
    # 库存预热key前缀
    stock-key-prefix: "seckill:stock:"
